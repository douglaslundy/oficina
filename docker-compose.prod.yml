version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mecanicapro
      POSTGRES_USER: mecanicapro
      POSTGRES_PASSWORD: Mp2026Secret
    volumes:
      - mecanicapro_pgdata:/var/lib/postgresql/data
    networks:
      - mecanicapro_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mecanicapro"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    networks:
      - mecanicapro_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      APP_NAME: MecânicaPro
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://192.168.0.115:8080
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: mecanicapro
      DB_USERNAME: mecanicapro
      DB_PASSWORD: Mp2026Secret
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      SANCTUM_STATEFUL_DOMAINS: "192.168.0.115:8080,localhost:8080"
      SESSION_DOMAIN: "192.168.0.115"
      CORS_ALLOWED_ORIGINS: "http://192.168.0.115:8080,http://localhost:3000"
      LOG_CHANNEL: stderr
      APP_KEY: ${APP_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mecanicapro_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php -r \"file_get_contents('http://localhost:8000/api/health') or exit(1);\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: http://192.168.0.115:8080
        NEXT_PUBLIC_DEFAULT_TENANT: oficina-silva
    networks:
      - mecanicapro_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/mecanicapro.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - mecanicapro_net
    restart: unless-stopped

networks:
  mecanicapro_net:
    driver: bridge

volumes:
  mecanicapro_pgdata:
